name: Crypto Paper Trader
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install ccxt pandas pandas_ta
    
    - name: Run crypto agent
      run: |
        python main.py --once || echo "Agent error - check logs above"
      continue-on-error: true
    
    - name: Show logs if exist
      run: ls -la *.json || echo "No logs.json created"
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: crypto-logs
        path: logs.json
