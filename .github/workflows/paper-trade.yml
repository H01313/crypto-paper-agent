name: Crypto Agent 24/7 LIVE
on:
  schedule:
    - cron: '*/30 * * * *'           # ← DIT = 24/7 elke 30 min!
  workflow_dispatch:                  # ← Manual knop blijft

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Run BTC Trader
      run: |
        echo "🚀 LIVE TRADE $(date)"
        python3 main.py
    
    - name: Show Trade Results
      run: |
        echo "--- LOGS ---"
        ls -la logs.json
        cat logs.json
    
    - name: 📥 Download Trades
      uses: actions/upload-artifact@v4
      with:
        name: btc-daily-trades
        path: logs.json
