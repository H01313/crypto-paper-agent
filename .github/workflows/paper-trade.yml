name: Crypto Agent 24/7 ✅
on:
  schedule:
    - cron: '*/30 * * * *'  # Automatisch elke 30 minuten
  workflow_dispatch:       # Manual knop

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run crypto agent
      run: |
        echo "🚀 Starting BTC trader..."
        python3 main.py
      
    - name: Verify logs created
      run: |
        ls -la logs.json || echo "❌ No logs.json"
        cat logs.json || echo "❌ Cannot read logs"
      
    - name: 📦 Upload BTC trades als download
      uses: actions/upload-artifact@v4
      with:
        name: btc-trades-logs
        path: logs.json
