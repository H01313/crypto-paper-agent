name: Crypto Paper Trader ✅
on: [workflow_dispatch]
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run PURE Python agent
      run: |
        echo "🚀 Starting crypto agent..."
        python3 main.py || echo "❌ Python crashed"
    
    - name: Verify logs
    - name: Upload logs als artifact
      uses: actions/upload-artifact@v4
      with:
        name: btc-trades
        path: logs.json
      run: |
        ls -la logs.json || echo "❌ No logs.json"
        cat logs.json || echo "❌ Cannot read logs"
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: crypto-logs
        path: logs.json
